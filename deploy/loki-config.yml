auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  # Required by Loki 3.x whenever retention is enabled: where pending delete requests are stored.
  # Without it the process exits at config validation (crash-looped 2026-07-09).
  delete_request_store: filesystem

limits_config:
  retention_period: 720h   # 30 days
