server {
    listen 80;
    server_name _;

    root /home/solvina/options/frontend;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to Spring Boot — mirrors the Vite dev proxy rewrite.
    # 900s read timeout: a cold backtest run blocks while it downloads history (the engine waits
    # up to 600s for the fetch job) — 60s turned every first run into a 504.
    location /api/ {
        proxy_pass http://127.0.0.1:8081/options/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 900s;
    }

    # Grafana
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
