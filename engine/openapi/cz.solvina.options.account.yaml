openapi: 3.0.3
info:
  title: Options Engine - Account API
  description: Account summary and open positions overview
  version: 1.0.0

paths:
  /account:
    get:
      tags:
        - Account
      summary: Get account overview with all positions
      operationId: getAccountOverview
      responses:
        '200':
          description: Account overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountOverviewDto'

  /account/positions/close:
    post:
      tags:
        - Account
      summary: Close (kill) an IBKR position with a market order
      operationId: closePosition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClosePositionRequestDto'
      responses:
        '204':
          description: Close order submitted

  /orders/{orderId}:
    delete:
      tags:
        - Account
      summary: Cancel an open IBKR order
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cancel request sent
        '404':
          description: Order not found

components:
  schemas:
    AccountOverviewDto:
      type: object
      required:
        - openPositionCount
        - openPositions
        - accountPositionCount
        - accountPositions
        - openOrderCount
        - openOrders
      properties:
        totalCapital:
          type: number
          nullable: true
          description: Net liquidation value (USD)
        availableFunds:
          type: number
          nullable: true
          description: Cash available for new trades (USD)
        unrealizedPnL:
          type: number
          nullable: true
          description: Unrealized P&L across all positions (USD)
        excessLiquidity:
          type: number
          nullable: true
          description: Excess liquidity (USD)
        openPositionCount:
          type: integer
          description: Number of spreads tracked by this engine
        openPositions:
          type: array
          description: Spreads opened by this engine (with strategy metadata)
          items:
            $ref: '#/components/schemas/OpenPositionDto'
        accountPositionCount:
          type: integer
          description: Total number of positions in the IBKR account
        accountPositions:
          type: array
          description: All positions in the IBKR account (stocks, options, futures, etc.)
          items:
            $ref: '#/components/schemas/AccountPositionDto'
        openOrderCount:
          type: integer
          description: Number of non-terminal open IBKR orders
        openOrders:
          type: array
          description: Open (non-terminal) orders currently on the IBKR account
          items:
            $ref: '#/components/schemas/OpenOrderDto'

    OpenPositionDto:
      type: object
      required:
        - id
        - symbol
        - soldStrike
        - boughtStrike
        - expiryDate
        - creditPerShare
        - maxRiskPerShare
        - maxRiskTotal
        - quantity
        - openedAt
        - dte
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        soldStrike:
          type: number
          description: Strike of the short (sold) put
        boughtStrike:
          type: number
          description: Strike of the long (bought) put
        expiryDate:
          type: string
          format: date
        creditPerShare:
          type: number
          description: Net credit received per share at entry
        maxRiskPerShare:
          type: number
          description: Maximum loss per share (spread width minus credit)
        maxRiskTotal:
          type: number
          description: Maximum total loss for the position (maxRiskPerShare × quantity × 100)
        quantity:
          type: integer
          description: Number of contracts
        dte:
          type: integer
          description: Calendar days until expiry as of today
        openedAt:
          type: string
          format: date-time
        ivRankAtEntry:
          type: number
          nullable: true
        underlyingPriceAtEntry:
          type: number
          nullable: true
        unrealizedPnL:
          type: number
          nullable: true
          description: "(creditPerShare - currentSpreadValue) × quantity × 100; null until first monitor check"

    ClosePositionRequestDto:
      type: object
      required:
        - conId
        - quantity
      properties:
        conId:
          type: integer
          description: IBKR contract ID
        quantity:
          type: number
          description: Current position size (negative = short). Closing order will use the opposite action.

    AccountPositionDto:
      type: object
      required:
        - account
        - symbol
        - secType
        - currency
        - quantity
        - avgCost
        - conId
        - orphan
      properties:
        conId:
          type: integer
          description: IBKR contract ID (used for closing orders)
        orphan:
          type: boolean
          description: >
            True when this held position is NOT explained by anything the engine actively manages
            (no open spread/flag covers it, or the held quantity does not match). Orphans have no
            automated exit and should be handled manually.
        orphanReason:
          type: string
          nullable: true
          description: Why the position is an orphan (only set when orphan is true)
        spreadId:
          type: string
          format: uuid
          nullable: true
          description: ID of the tracked spread this leg belongs to (null for orphans and stock)
        spreadLabel:
          type: string
          nullable: true
          description: Human label of the owning spread, e.g. "PG 140/135 P" (for grouping in the UI)
        legRole:
          type: string
          nullable: true
          description: Role of this leg within its spread — SHORT or LONG
        account:
          type: string
          description: IBKR account ID
        symbol:
          type: string
        secType:
          type: string
          description: Security type (STK, OPT, FUT, etc.)
        currency:
          type: string
        expiry:
          type: string
          format: date
          nullable: true
          description: Expiry date for options and futures
        strike:
          type: number
          nullable: true
          description: Strike price for options
        optionRight:
          type: string
          nullable: true
          description: P (put) or C (call) for options
        quantity:
          type: number
          description: Position size; negative means short
        avgCost:
          type: number
          description: Average cost per share or per contract
        unrealizedPnL:
          type: number
          nullable: true
          description: Unrealized P&L from IBKR (USD)

    OpenOrderDto:
      type: object
      required:
        - orderId
        - symbol
        - action
        - orderType
        - status
      properties:
        orderId:
          type: integer
        symbol:
          type: string
        action:
          type: string
          description: BUY or SELL
        orderType:
          type: string
          description: LMT, MKT, etc.
        limitPrice:
          type: number
          nullable: true
        status:
          type: string
          description: PreSubmitted, Submitted, PendingSubmit, etc.
