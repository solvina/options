openapi: 3.0.3
info:
  title: Options Engine - Health API
  description: Health and connection status endpoints
  version: 1.0.0

paths:
  /health/ibkr:
    get:
      tags:
        - Health
      summary: Get IBKR connection status
      operationId: getIbkrConnectionStatus
      responses:
        '200':
          description: Connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IbkrConnectionStatus'

  /health/fatal:
    get:
      tags:
        - Health
      summary: Get fatal-lockout status
      description: >
        Whether the engine has latched a FATAL condition (e.g. the connected IBKR account does not
        match the configured one). While fatal, order placement is blocked at the broker socket;
        the state clears only by fixing the cause and restarting the engine.
      operationId: getFatalStatus
      responses:
        '200':
          description: Fatal-lockout status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FatalStatus'

  /health/market-data:
    get:
      tags:
        - Health
      summary: Get live market-data flow status
      description: >
        Whether the engine is actually receiving market prices, independent of the socket
        connection. The IBKR socket can be connected while data is fully starved (e.g. a
        competing session), so this reflects real price-fetch success/failure.
      operationId: getMarketDataHealth
      responses:
        '200':
          description: Market-data flow status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketDataHealth'

components:
  schemas:
    FatalStatus:
      type: object
      required:
        - fatal
        - reasons
      properties:
        fatal:
          type: boolean
          description: True when the engine is in fatal lockout and order placement is blocked
        reasons:
          type: array
          items:
            $ref: '#/components/schemas/FatalReason'

    FatalReason:
      type: object
      required:
        - title
        - detail
        - at
      properties:
        title:
          type: string
          description: Short cause, e.g. "IBKR account mismatch"
        detail:
          type: string
          description: Full explanation including what to fix
        at:
          type: string
          format: date-time
          description: When the condition latched

    IbkrConnectionStatus:
      type: object
      required:
        - connected
        - autoReconnectEnabled
        - autoReconnectThreadActive
        - connectionInitialized
      properties:
        connected:
          type: boolean
          description: Whether the IBKR connection is currently active
        autoReconnectEnabled:
          type: boolean
          description: Whether auto-reconnect is configured
        autoReconnectThreadActive:
          type: boolean
          description: Whether the auto-reconnect thread is currently running
        connectionInitialized:
          type: boolean
          description: Whether the connection has been initialized at least once

    MarketDataHealth:
      type: object
      required:
        - flowing
        - successes
        - failures
        - competingSession
        - marketOpen
      properties:
        flowing:
          type: boolean
          description: A price fetch succeeded within the freshness window — data is live
        lastSuccessAgeSeconds:
          type: integer
          format: int64
          nullable: true
          description: Seconds since the last successful price fetch, or null if none yet
        successes:
          type: integer
          description: Successful price fetches in the trailing 10-minute window
        failures:
          type: integer
          description: Failed price fetches in the trailing 10-minute window
        lastError:
          type: string
          nullable: true
          description: Most recent failure reason (for display), or null when healthy
        competingSession:
          type: boolean
          description: >
            IBKR reported a competing session (a TWS/app on the same account from another IP)
            recently — the actionable "log out of TWS" cause behind a data outage
        marketOpen:
          type: boolean
          description: >
            At least one watchlist market is currently in session. When false, no data is expected
            (after-hours) so "not flowing" is benign, not an outage
