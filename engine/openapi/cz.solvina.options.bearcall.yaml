openapi: 3.0.3
info:
  title: Options Engine - Bear Call API
  description: Bear Call Spread positions (read + manual close)
  version: 1.0.0

paths:
  /bear-call-spreads:
    get:
      tags:
        - BearCall
      summary: List bear call spread positions
      operationId: listBearCallSpreads
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Paginated bear call spread positions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedBearCallSpreadsDto'

  /bear-call-spreads/dividend-risk:
    get:
      tags:
        - BearCall
      summary: Open bear call spreads with an ex-dividend date within the risk window
      operationId: listBearCallDividendRisk
      responses:
        '200':
          description: Bear call spreads currently exposed to ex-dividend assignment risk
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BearCallSpreadDto'

  /bear-call-spreads/{id}:
    get:
      tags:
        - BearCall
      summary: Get a bear call spread by ID
      operationId: getBearCallSpreadById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Bear call spread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BearCallSpreadDto'
        '404':
          description: Not found

  /bear-call-spreads/{id}/close:
    post:
      tags:
        - BearCall
      summary: Soft-close a bear call spread at mid price (limit orders)
      operationId: softCloseBearCallSpread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Spread closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BearCallSpreadDto'
        '404':
          description: Not found
        '409':
          description: Spread is not open

  /bear-call-spreads/{id}/close-force:
    post:
      tags:
        - BearCall
      summary: Force-close a bear call spread at market price
      operationId: forceCloseBearCallSpread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Spread closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BearCallSpreadDto'
        '404':
          description: Not found
        '409':
          description: Spread is not open

  /bear-call-spreads/analytics:
    get:
      tags:
        - BearCall
      summary: Aggregate performance analytics across all bear call trades
      operationId: getBearCallAnalytics
      responses:
        '200':
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BearCallAnalyticsDto'

components:
  schemas:
    BearCallAnalyticsDto:
      type: object
      required: [summary, byStatus, bySymbol, byEntryIvBucket, pnlTimeline]
      properties:
        summary:
          $ref: '#/components/schemas/BearCallAnalyticsSummaryDto'
        byStatus:
          type: array
          items:
            $ref: '#/components/schemas/BearCallStatusBreakdownDto'
        bySymbol:
          type: array
          items:
            $ref: '#/components/schemas/BearCallSymbolBreakdownDto'
        byEntryIvBucket:
          type: array
          items:
            $ref: '#/components/schemas/BearCallIvBucketBreakdownDto'
        pnlTimeline:
          type: array
          items:
            $ref: '#/components/schemas/BearCallPnlTimelinePointDto'

    BearCallAnalyticsSummaryDto:
      type: object
      required: [totalTrades, openTrades, winRate, totalRealizedPnl, avgPnlPerTrade, avgHoldDays]
      properties:
        totalTrades:
          type: integer
        openTrades:
          type: integer
        winRate:
          type: number
        totalRealizedPnl:
          type: number
        avgPnlPerTrade:
          type: number
        avgHoldDays:
          type: number

    BearCallStatusBreakdownDto:
      type: object
      required: [status, count, totalPnl, avgPnl, avgHoldDays]
      properties:
        status:
          type: string
        count:
          type: integer
        totalPnl:
          type: number
        avgPnl:
          type: number
        avgHoldDays:
          type: number

    BearCallSymbolBreakdownDto:
      type: object
      required: [symbol, count, wins, winRate, totalPnl, avgPnl, avgCreditRatio]
      properties:
        symbol:
          type: string
        count:
          type: integer
        wins:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        avgPnl:
          type: number
        avgCreditRatio:
          type: number

    BearCallIvBucketBreakdownDto:
      type: object
      required: [bucket, count, winRate, avgPnl]
      properties:
        bucket:
          type: string
        count:
          type: integer
        winRate:
          type: number
        avgPnl:
          type: number

    BearCallPnlTimelinePointDto:
      type: object
      required: [date, dailyPnl, cumulativePnl]
      properties:
        date:
          type: string
          format: date
        dailyPnl:
          type: number
        cumulativePnl:
          type: number

    BearCallSpreadDto:
      type: object
      required:
        - symbol
        - status
        - soldStrike
        - boughtStrike
        - expiryDate
        - creditPerShare
        - maxRiskPerShare
        - quantity
        - openedAt
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        status:
          type: string
        soldStrike:
          type: number
        boughtStrike:
          type: number
        expiryDate:
          type: string
          format: date
        creditPerShare:
          type: number
        maxRiskPerShare:
          type: number
        quantity:
          type: integer
        ivRankAtEntry:
          type: number
          nullable: true
        underlyingPriceAtEntry:
          type: number
          nullable: true
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
          nullable: true
        closeReason:
          type: string
          nullable: true
        closePricePerShare:
          type: number
          nullable: true
        currentSpreadValue:
          type: number
          nullable: true
        currentPnl:
          type: number
          nullable: true
        underlyingPriceNow:
          type: number
          nullable: true
          description: Latest underlying spot recorded by the monitor (null until the first check on an open spread)
        distanceToShortStrikePct:
          type: number
          nullable: true
          description: >
            Cushion of the underlying from the short strike, as a percent of spot. Positive = safe
            side (bear call below the short strike); negative = breached. Null when no spot available.
        underlyingPriceAtExit:
          type: number
          nullable: true
        ivRankAtExit:
          type: number
          nullable: true
        exDividendDate:
          type: string
          format: date
          nullable: true

    PagedBearCallSpreadsDto:
      type: object
      required: [content, totalElements, totalPages, page, size]
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BearCallSpreadDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer
