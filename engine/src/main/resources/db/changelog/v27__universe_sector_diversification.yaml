databaseChangeLog:
  # ---------------------------------------------------------------------------
  # Sector diversification of the SPREAD universe (2026-07-14).
  # The universe was ~44% Information Technology, so the spread scanner produced
  # a tech-correlated book. This adds 76 liquid-optionable non-tech names and
  # rebalances `enabled` to a ~9-10-per-GICS-sector active set (105 single names
  # + 7 index/sector ETFs = 112 enabled). Only the `enabled` (spread-scanner)
  # flag is touched; `flag_enabled` (bull-flag strategy) is left at its default
  # false on the new rows and untouched on existing rows.
  # Rationale + full ticker list: docs/UNIVERSE_DIVERSIFICATION.md
  # Already applied live to the paper DB via the /universe API on 2026-07-14;
  # this changeset is authored idempotently to reproduce that state.
  # ---------------------------------------------------------------------------
  - changeSet:
      id: v27__universe_sector_diversification
      author: solvina
      changes:
        - sql:
            splitStatements: true
            stripComments: false
            sql: >
