databaseChangeLog:
  - changeSet:
      id: v14__engine_trade_entries
      author: solvina
      changes:
        - createTable:
            tableName: engine_trade_entries
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: symbol
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: spread_type
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: long_strike
                  type: NUMERIC(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: short_strike
                  type: NUMERIC(10, 2)
              - column:
                  name: quantity
                  type: INT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: entry_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: entry_credit
                  type: NUMERIC(10, 4)
              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: OPEN
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: INT
              - column:
                  name: close_attempts
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: last_close_attempt
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: closed_date
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: closed_price
                  type: NUMERIC(10, 4)
              - column:
                  name: notes
                  type: VARCHAR(500)
        - addUniqueConstraint:
            tableName: engine_trade_entries
            columnNames: order_id
            constraintName: uk_order_id
        - createIndex:
            tableName: engine_trade_entries
            indexName: idx_symbol_strikes
            columns:
              - column:
                  name: symbol
              - column:
                  name: long_strike
              - column:
                  name: short_strike
        - createIndex:
            tableName: engine_trade_entries
            indexName: idx_status_entry_date
            columns:
              - column:
                  name: status
              - column:
                  name: entry_date
