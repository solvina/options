app:
  timezone: Europe/Berlin

spring:
  jackson:
    time-zone: Europe/Berlin

scanner:
  watchlist: [ SPY, QQQ, AAPL, MSFT, AMZN, IWM, DIA, TSLA, NVDA, META, GOOGL, XLF, XLE, XLV, AMD, UNH, ASML ]
  # Every 15 minutes, 9 AM - 10:59 PM CEST (covers EU 9:00-17:30 + US 9:30-16:00 in CEST)
  # Format: seconds minutes hours day-of-month month day-of-week
  cron: "0 */15 9-22 * * MON-FRI"
  option-params-cache-ttl-hours: 1
  # Bear call strategy go-live (paper). Other params use BearCallScannerConfig defaults
  # (target-delta 0.30, iv-rank 45, min-credit $0.40, $5 width, US-only dividend protection).
  # Shares the portfolio cap (max 5 spreads total across bull put + bear call).
  bear-call:
    enabled: true

ibkr:
  connection:
    host: localhost   # IB Gateway runs in Docker on the same RPi, mapped to host:7497
    paper-account: true
    use-live-market-data: true   # use live data for better options availability
  instruments:
    ASML:
      currency: EUR
      exchange: AEB
      optionExchange: EUREX
      marketExchange: EU
      marketTimezone: Europe/Amsterdam
      marketOpen: "09:00"
      marketClose: "17:30"
    SAP:
      currency: EUR
      optionExchange: EUREX   # base config has DTB but IBKR returns EUREX
      marketExchange: EU
    SIE:
      currency: EUR
      optionExchange: EUREX   # base config has DTB but IBKR returns EUREX
      marketExchange: EU
    ALV:
      currency: EUR
      optionExchange: EUREX   # base config has DTB but IBKR returns EUREX
      marketExchange: EU

sweep:
  enabled: false   # a 100k-combo sweep would starve the trading engine — run sweeps on the workstation
