app:
  timezone: Europe/Berlin

spring:
  jackson:
    time-zone: Europe/Berlin

scanner:
  watchlist: [ SPY, QQQ, AAPL, MSFT, AMZN, IWM, DIA, TSLA, NVDA, META, GOOGL, XLF, XLE, XLV, AMD, UNH, ASML ]
  cron: "0 */15 9-22 * * MON-FRI"   # Europe/Berlin: 09:00 EU open → 22:00 US close (16:00 ET = 22:00 CEST)

ibkr:
  connection:
    host: localhost   # IB Gateway runs in Docker on the same RPi, mapped to host:7497
    paper-account: true
    use-live-market-data: true   # use live data for better options availability
  instruments:
    ASML:
      currency: EUR
      exchange: AEB
      optionExchange: EUREX
      marketExchange: EU
      marketTimezone: Europe/Amsterdam
      marketOpen: "09:00"
      marketClose: "17:30"
    SAP:
      currency: EUR
      optionExchange: EUREX   # base config has DTB but IBKR returns EUREX
      marketExchange: EU
    SIE:
      currency: EUR
      optionExchange: EUREX   # base config has DTB but IBKR returns EUREX
      marketExchange: EU
    ALV:
      currency: EUR
      optionExchange: EUREX   # base config has DTB but IBKR returns EUREX
      marketExchange: EU
