spring:
  application:
    name: options
  task:
    scheduling:
      # Multi-thread the scheduler so the long spread scan can't starve the flag/watchdog crons
      # (they previously shared a single thread; the US-open flag cron was blocked by the scan).
      pool:
        size: 4
  webflux:
    base-path: /options
  datasource:
    url: jdbc:postgresql://localhost:5433/options
    username: options_user
    password: options_password
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

ibkr:
  exchanges:
    US:
      timezone: America/New_York
      open: "09:30"
      close: "16:00"
    EU:
      timezone: Europe/Berlin
      open: "09:00"
      close: "17:30"
  instruments:
    ASML:
      currency: EUR
      optionExchange: DTB
      marketExchange: EU
    SAP:
      currency: EUR
      optionExchange: DTB
      marketExchange: EU
    SIE:
      currency: EUR
      optionExchange: DTB
      marketExchange: EU
    ALV:
      currency: EUR
      optionExchange: DTB
      marketExchange: EU
  connection:
    host: 100.65.216.36
    port: 7497
    client-id: 1
    account: "DU7875979"           # set to your IBKR account code, e.g. U1234567
    use-ssl: false
    enabled: true
    auto-reconnect: true
    reconnect-interval-ms: 10000
    use-live-market-data: true     # paper account with live data subscription enabled in TWS

scanner:
  # ---- Shared across all strategies (bull put + bear call) ----
  trading-enabled: true            # paper trading active with live data subscription
  # 2026-07-07: 30 → 5 after the P&L review. The 30-cap experiment filled 21 correlated tech bull
  # puts into the Jul 6 vol spike AND saturated the 60s exit monitor (skip canary fired intraday).
  max-open-spreads: 5              # portfolio cap across bull put + bear call combined
  max-new-entries-per-day: 4       # fills per day across strategies — one scan day can't fill the book
  execution-timeout-minutes: 15
  ticks-before-price-adjust: 5
  price-adjust-interval-seconds: 30
  max-leg-bid-ask-spread-pct: 0.15 # Conservative: 0.30 → 0.15 (only liquid options); re-checked on the fresh tick at execution
  entry-min-fill-pct-of-mid: 0.85  # ladder floor: never rest below 85% of fresh mid (Jul 6–7 fills averaged 68% of mid)
  order-chase-timeout-minutes: 3   # Conservative: 5 → 3 (give up sooner, retry next scan)
  order-chase-max-retries: 1       # Conservative: 3 → 1 (one attempt per order, not aggressive chasing)
  order-chase-price-step: 0.01     # Conservative: 0.03 → 0.01 (gradual adjustments, avoid floor hits)
  # Stop-loss quality gates (2026-07-07): SL needs 2 consecutive breaching cycles, never fires in
  # the first 15 min after entry nor the first 30 min of the session (LITE stopped 29s after entry,
  # NBIS at 9:59 ET on opening-width quotes — both pure quote artifacts).
  stop-loss-confirm-cycles: 2
  stop-loss-grace-minutes-after-entry: 15
  stop-loss-skip-first-rth-minutes: 30
  # Cron: Every 15 minutes, 9 AM - 10:59 PM (server timezone CEST)
  # Covers: EU 9:00-17:30 + US 9:30-16:00 (converted to CEST)
  # Format: seconds minutes hours day-of-month month day-of-week
  cron: "0 */15 9-22 * * MON-FRI"
  monitor-delay-ms: 60000
  iv-history-days: 365
  iv-cache-ttl-minutes: 60
  option-params-cache-ttl-hours: 1
  # ---- Bull put strategy params (scanner.bull-put.*) ----
  bull-put:
    iv-rank-threshold: 45
    min-dte: 30
    max-dte: 50
    preferred-dte: 45
    # 2026-07-07: 0.30 → 0.25. At TP 50% / SL 100%-of-mid the break-even win rate is ~67%; a
    # 30-delta short (~70% POP) left almost no edge, 25-delta (~75%) restores a cushion.
    target-delta: 0.25
    delta-min: 0.20                # accept short-put delta band 0.20–0.30
    delta-max: 0.30
    strike-band-percent: 0.20
    candidate-strike-count: 7
    spread-width-usd: 5.0
    min-credit-per-share: 0.35     # Conservative: 0.50 → 0.35 for better fill rates
    max-credit-pct-of-width: 0.40  # crash-pricing guard: mid > 40% of width = near-even ITM odds, skip
    max-risk-percent: 0.025
    take-profit-percent: 0.50
    # 2026-07-07: 2.00 → 1.00 AND the basis changed from fill credit to ENTRY MID (fair value at
    # fill): exit when the spread is worth 2× its entry mid. The old 3×-fill-credit stop plus fills
    # far below mid meant positions could be born already stopped out (LITE, NBIS). At TP 50% /
    # SL 100% the break-even win rate is ~67%; the old 50%/200% needed ~80% (realized: 35%).
    stop-loss-percent: 1.00
    time-profit-dte: 21            # manage/close at 21 DTE (tastytrade-style); was 14
    drift-protection-pct: 0.05     # Conservative: 0.01 → 0.05 (allow 5% movement, not 1%)

# Dividend data: refreshed daily into instrument_universe (ex_dividend_date/next_dividend_amount).
# Source is the IBKR IB_DIVIDENDS tick by default. On a paper deployment running on DELAYED market
# data (ibkr.connection.use-live-market-data=false) that tick is unavailable — enable the remote
# relay instead so this engine reads what the PROD engine's refresh stored in its own database.
dividends:
  refresh-cron: "0 30 6 * * *"   # paper+remote: set after prod's refresh, e.g. "0 0 7 * * *"
  remote:
    enabled: false
    jdbc-url: ""                 # e.g. jdbc:postgresql://<prod-tailscale-ip>:5433/options
    username: ${DIVIDENDS_REMOTE_DB_USER:options_user}
    password: ${DIVIDENDS_REMOTE_DB_PASSWORD:}
    # Relay health is recorded per attempt in dividend_sync_status (local DB).
    # Tunables (defaults): cache-ttl-minutes: 15, failure-backoff-minutes: 10,
    # connect-timeout-seconds: 10, alert-after-consecutive-failures: 3

# Operational alerts (Telegram). Token/chat injected from env (same .env the bot uses).
alerts:
  telegram:
    enabled: true
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}

# Email notifications: one rich email per qualified spread candidate (bull put + bear call).
# Credentials injected from env (.env). Password is a Gmail App Password (2FA), never the account password.
notifications:
  email:
    enabled: true
    smtp-host: smtp.gmail.com
    smtp-port: 587
    username: ${NOTIFY_EMAIL_USER:}
    password: ${NOTIFY_EMAIL_APP_PASSWORD:}
    from: ${NOTIFY_EMAIL_FROM:}
    to: ${NOTIFY_EMAIL_TO:}
    dedupe-minutes: 720       # one email per opportunity (symbol+strikes+expiry) per 12h

# Market regime: trend (SMA-fast vs SMA-slow) + momentum (RSI) → directional bias that gates
# strategy selection (bull put vs bear call) per symbol. gating-enabled=true makes the bias vote;
# false = observe-only (logged, no gate). Warmed off-path daily 07:00 + at startup.
regime:
  lookback-days: 250
  sma-fast: 50
  sma-slow: 200
  rsi-period: 14
  rsi-overbought: 70.0
  rsi-oversold: 30.0
  gating-enabled: true      # directional gate ON (paper observation)

# Position reconciliation: alert on IBKR positions not managed by any OPEN spread.
reconciliation:
  delay-ms: 300000          # run every 5 min
  initial-delay-ms: 120000  # first run 2 min after boot (let positions populate)

# Quote age monitoring: detect stale/blind market data during exit decisions (Phase 1 — observability only).
quote-monitoring:
  stale-seconds: 60         # age ≥ 60s → STALE
  blind-seconds: 300        # age ≥ 300s → BLIND (5 min)
  blind-cycles-before-exit: 2  # synthetic stops only after N consecutive BLIND cycles (hysteresis)
  synthetic-risk-exit-enabled: false  # Phase 2: BS risk-only fallback (disabled for now, dry-run first)

flag:
  # Watchlist is DB-driven via instrument_universe.flag_enabled (UniversePort.getFlagWatchlist).
  atr-period: 14
  atr-multiplier: 2.0
  volume-ma-period: 20
  volume-spike-multiplier: 1.5
  pole-min-bars: 5
  pole-max-bars: 10
  flag-min-bars: 5
  flag-max-bars: 20
  max-retracement-pct: 0.50
  historical-bootstrap-days: 3
  # Entry quality filters. INTERIM loosening 2026-06-17 — every live breakout today was a near-miss
  # on one of these (channel-slope, flag-bars, retracement, pole/ATR band). Pending backtest
  # validation. Previous values in parentheses.
  skip-first-rth-minutes: 90
  require-negative-channel-slope: false   # was true — many real bull flags have a flat/slightly-rising channel
  min-flagpole-atr-multiple: 1.5          # was 2.0
  max-flagpole-atr-multiple: 5.0          # was 4.0
  min-flag-retracement-pct: 0.15          # was 0.25
  min-flag-bars-for-entry: 5              # was 7

# Re-attaches fill watchers to PENDING/OPEN flag rows after a restart/disconnect (they are
# in-memory only) and adopts/closes positions whose orders changed while nobody was watching —
# the short-stock-orphan fix. Runs at startup (after IBKR connect) and on this schedule.
flag-recovery:
  delay-ms: 300000          # sweep every 5 min
  initial-delay-ms: 180000  # first scheduled sweep 3 min after boot (startup run happens earlier)

influxdb:
  url: http://localhost:8086
  token: ${INFLUXDB_TOKEN:options_token_changeme}
  org: options
  bucket: market_data

app:
  timezone: Europe/Berlin

server:
  port: 8081

springdoc:
  packagesToScan: cz.solvina.options
  use-management-port: false
