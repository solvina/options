services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: options_user
      POSTGRES_PASSWORD: options_password
      POSTGRES_DB: options
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-no}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD}
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-restart}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${RELOGIN_AFTER_TWOFA_TIMEOUT:-yes}
      EXISTING_SESSION_DETECTED_ACTION: ${EXISTING_SESSION_DETECTED_ACTION:-primary}
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-}
      TIME_ZONE: ${TIME_ZONE:-Etc/UTC}
      TZ: ${TIME_ZONE:-Etc/UTC}
    volumes:
      - ibkr_settings:/home/ibgateway/Jts
    ports:
      - "7497:4004"   # paper SOCAT relay: 4004 → 4002 (internal), host 7497 matches application.yml
      - "5901:5900"   # VNC

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    volumes:
      - ./deploy/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "127.0.0.1:3100:3100"

  grafana:
    image: grafana/grafana-oss:11.6.1
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: "options"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [loki]

  alloy:
    image: grafana/alloy:v1.8.3
    restart: unless-stopped
    user: root
    volumes:
      - ./deploy/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command: run /etc/alloy/config.alloy
    depends_on: [loki]

volumes:
  ibkr_settings:
  loki-data:
  grafana-data:
