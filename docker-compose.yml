services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: options_user
      POSTGRES_PASSWORD: options_password
      POSTGRES_DB: options
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  influxdb:
    image: influxdb:2.7
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: options
      DOCKER_INFLUXDB_INIT_BUCKET: market_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - ./data/influxdb-data:/var/lib/influxdb2
    ports:
      # LAN-exposed (not just localhost): the RPi master replicates the market_data bucket here
      # via InfluxDB Edge Data Replication (see scripts/setup-influx-replication.sh).
      - "8086:8086"
